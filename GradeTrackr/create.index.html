<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="homestylesheet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;1,300&family=Varela+Round&display=swap" rel="stylesheet">
    <title>Criar trabalho</title>
</head>
<body>
    <header class="main-header">
        <div class="header-title-wrapper">
            <div class="header-title-container">
                <h2 class="header-title title">Adicionar trabalho</h2>
            </div>
        </div>
    </header>
    <div class="page-content">
        <h3 class="work-data-indicator subtitle">Informações do trabalho</h3>
        <div class="work-form-wrapper">
            <form class="work-data-form" id="work-data-form" method="#">
                <label for="title">Título do trabalho:</label><br>
                <input id="title" type="text" name="title" required><br>
                <label for="subject-input" >Matéria:</label><br>
                <input list="subjects" id="subject-input" type="text" name="subject" required><br>
                <datalist id="subjects">
                    <option value="Análise e met. para sistemas"></option>
                    <option value="Arte"></option>
                    <option value="Banco de dados"></option>
                    <option value="Biologia"></option>
                    <option value="Educação física"></option>
                    <option value="Ed Dig Comp Prog E Ia"></option>
                    <option value="Geografia"></option>
                    <option value="Inglês"></option>
                    <option value="Introdução à computação"></option>
                    <option value="Introdução à programação"></option>
                    <option value="Lógica computacional"></option>
                    <option value="Matemática"></option>
                    <option value="Português"></option>
                    <option value="Química"></option>
                </datalist>
                <label for="date-input">Data de entrega:</label><br>
                <input id="date-input" type="date" name="date" required><br>
                <label for="collaborators">Participantes(grupo)</label><br>
                <input id="collaborators" type="number">
                <ol id="collaborators-list"></ol>
                <input type="submit" id="submit-button">
            </form>
        </div>
    </div>
    <script src="./createPage.js"></script>
</body>
</html>
