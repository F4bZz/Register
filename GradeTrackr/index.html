<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="homestylesheet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;1,300&family=Varela+Round&display=swap" rel="stylesheet">
    <title>GradeTrackr - Meus trabalhos</title>
</head>
<body>
    <header class="main-header">
        <div class="header-title-wrapper">
            <div class="header-title-container">
                <h2 class="header-title title">GradeTrackr</h2>
                <p class="header-subtitle subtitle">Armazenamento de trabalhos pendentes</p>
            </div>
        </div>
    </header>
    <div class="page-content">
        <ol id="work-list">
            <div class="work-frame-wrapper">
                <div class="work-data-container">
                    <h3 class="work-title title" id="title">Título</h3>
                    <p class="work-sbject subtitle" id="subject">Matéria</p>
                    <p class="work-date-display" id="">dd/mm/aaaa</p>
                </div>
            </div>
        </ol>
        
    </div>
    <footer class="main-footer">
        <div class="footer-title-container">
            <p class="footer-title title">Adicione um trabalho</p>
            <p class="footer-subtitle subtitle">Adicione um trabalho aqui e ele será salvo até que você o remova</p>
        </div>
        <div class="create-button-wrapper">
            <a href="./create.index.html"><button id="create-button" class="title">+</button></a>
            
        </div>
    </footer>
    <script src="./main.js"></script>
</body>
</html>
