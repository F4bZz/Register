<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Inter&family=Nunito&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Criar trabalho</title>
</head>
<body>
    <header class="main-header">
        <div class="header-title-wrapper">
            <div class="header-title-container">
                <h2 class="header-title title">Adicionar trabalho</h2>
            </div>
        </div>
    </header>
    <div class="page-content">
        <h3 class="work-data-indicator subtitle">Informações do trabalho</h3>
        <div class="work-form-wrapper container">
            <form class="work-data-form" id="work-data-form" method="#">
                <label for="title" class="title">Título do trabalho:</label><br>
                <input id="title" type="text" name="title" required><br>
                <label for="subject-input" class="title">Matéria:</label><br>
                <input list="subjects" id="subject-input" type="text" name="subject" required><br>
                <datalist id="subjects">
                    <option value="Análise e met. para sistemas"></option>
                    <option value="Arte"></option>
                    <option value="Banco de dados"></option>
                    <option value="Biologia"></option>
                    <option value="Educação física"></option>
                    <option value="Ed Dig Comp Prog E Ia"></option>
                    <option value="Geografia"></option>
                    <option value="Inglês"></option>
                    <option value="Introdução à computação"></option>
                    <option value="Introdução à programação"></option>
                    <option value="Lógica computacional"></option>
                    <option value="Matemática"></option>
                    <option value="Português"></option>
                    <option value="Química"></option>
                </datalist>
                <label for="date-input" class="title">Data de entrega:</label><br>
                <input id="date-input" type="date" name="date" required><br>
                <label for="collaborators" class="title">Participantes(grupo)</label><br>
                <input id="collaborators" type="number" oninput="updateCollabList(true);">
                <div class="container collab-list-container">
                    <ol id="collaborators-list"></ol>
                </div>
                <label for="description-input" class="title">Descrição e notas:</label>
                <textarea id="description-input" class="subtitle" name="description"></textarea>
                <input type="submit" id="submit-button">
            </form>
        </div>
        <!--
        <h1 class="title" style="width: 100%; text-align: center; margin-top: 20px; margin-bottom: 20px;">OU</h1>
        
        <div class="json-input-wrapper container">
            <form id="json-data-form">
                <label for="json-input" class="title" required>Inserir dados em JSON</label>
                <input type="text" id="json-input" name="json">
                <input type="submit">
            </form>
        </div>
        -->
    </div>
    <script src="./createPage.js"></script>
</body>
</html>
