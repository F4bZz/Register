<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!DOCTYPE html>
<html lang="en">
<head>
  <!-- Básico obrigatório -->
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título -->
     <title>Gradtrackr - Trabalhos</title>

  <!-- Favicon -->
      <link rel="icon" href="./icon.ico" type="image/x-icon">

  <!-- CSS principal -->
     <link rel="stylesheet" href="stylesheet.css">

  <!-- Google Fonts (opcional mas todo mundo usa) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Inter&display=swap" rel="stylesheet">

  <!-- SEO básico -->
  <meta name="description" content="Guarde informações de seus trabalhos aqui e pare de esquecê-los ">
  <meta name="keywords" content="trabalho, work, grade, nota">

  <!-- Open Graph (pra link bonito no Discord/Whats) -->
  <meta property="og:title" content="Experimente não precisar memorizar seus trabalhos">
  <meta property="og:description" content="Relembre seus trabalhos com o gradtrackr">
</head>

<body>
    <header class="main-header">
        <div class="header-title-wrapper">
            <div class="header-title-container">
                <h2 class="header-title title">GradeTrackr</h2>
                <p class="header-subtitle subtitle">Armazenamento de trabalhos pendentes</p>
            </div>
        </div>
    </header>
    <div class="page-content">
        <ol id="work-list">
            <div class="work-frame-wrapper">
                <div class="work-data-container">
                    <h3 class="work-title title" id="title">Título</h3>
                    <p class="work-sbject subtitle" id="subject">Matéria</p>
                    <p class="work-date-display" id="">dd/mm/aaaa</p>
                </div>
            </div>
        </ol>
        
    </div>
    <footer class="main-footer">
        <div class="footer-title-container">
            <p class="footer-title title">Adicione um trabalho</p>
            <p class="footer-subtitle subtitle">Adicione um trabalho aqui e ele será salvo até que você o remova</p>
        </div>
        <div class="create-button-wrapper">
            <a href="./create.html"><button id="create-button" class="title">+</button></a>
            
        </div>
    </footer>
    <script src="./main.js"></script>
</body>
</html>
